name: Update YouTube Trending Data

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  update-json:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v3

      - name: Ambil Data JSON dari Cermin API Tokhmi
        run: |
          # Mengambil dari server cermin Piped API yang aktif lancar
          curl -s "https://pipedapi.tokhmi.xyz/trending?region=ID" -o piped.json
          
          # Memproses data menggunakan Python bawaan GitHub
          python3 -c '
          import json
          import os

          try:
              if os.path.exists("piped.json"):
                  with open("piped.json", "r", encoding="utf-8") as f:
                      data = json.load(f)
                  
                  output_list = []
                  for item in data:
                      v_id = item.get("url", "").split("=")[-1] if "=" in item.get("url", "") else item.get("url", "").split("/")[-1]
                      
                      video_data = {
                          "type": "video",
                          "videoId": v_id,
                          "title": item.get("title", ""),
                          "videoThumbnails": [
                              {"url": item.get("thumbnail", "")}
                          ]
                      }
                      output_list.append(video_data)
                  
                  with open("trending.json", "w", encoding="utf-8") as f:
                      json.dump(output_list, f, ensure_ascii=False, indent=2)
                  print("Konversi JSON Berhasil!")
          except Exception as e:
              print("Gagal:", e)
          '

      - name: Simpan dan Push Perubahan ke GitHub
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          git add trending.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update data trending otomatis" && git push)
